# This workflow will build a Java project with Ant and create a daily 
# release of the bash and win targets.
#
# For more information see:
# - https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-ant
# - https://github.com/AAVSO/VStar/issues/340

name: Snapshot release 

#on:
#  schedule:
#     # every day at 0845 GMT
#    - cron: '45 08 * * *'

on:
  push:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest

    name: Snapshot release

    steps:
    - uses: actions/checkout@v2
    - name: Set up Java
      uses: actions/setup-java@v1
      with:
        java-version: '17'
    - name: Create plugin dir
      run:
        mkdir -p ~/vstar_plugins
    - name: Create plugin libs dir
      run:
        mkdir -p ~/vstar_plugin_libs
    - name: Build bash archive
      run:
        ant -noinput -buildfile build.xml bash
    - name: Build win archive
      run:
        ant -noinput -buildfile build.xml win
#    - name: Build mac archive
#      run:
#        ant -noinput -buildfile build.xml mac
    - name: Build plugins archive
      run: |
        cd plugin
        ant -noinput -buildfile build.xml aavso
        cd ..
    - name: Cache Maven repository for rrd-antlr4
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: rrd-antlr4-0.1.2-maven
    - name: Generate VeLa grammar PDFs
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y enscript ghostscript maven

        # Plain text grammar PDF
        enscript --no-header --font=Courier10 -p - src/org/aavso/tools/vstar/vela/VeLa.g4 | ps2pdf - VeLa.g4.pdf

        # Railroad diagram PDF via rrd-antlr4
        git clone --depth 1 https://github.com/bkiers/rrd-antlr4.git /tmp/rrd-antlr4
        mvn -q clean package -f /tmp/rrd-antlr4/pom.xml
        cd /tmp/rrd-antlr4/target
        # rrd-antlr4 uses an older ANTLR4 meta-grammar that doesn't support
        # element options (< assoc = right >), so strip them before processing.
        sed 's/<[[:space:]]*assoc[[:space:]]*=[[:space:]]*right[[:space:]]*>//' \
          "$GITHUB_WORKSPACE/src/org/aavso/tools/vstar/vela/VeLa.g4" > /tmp/VeLa-rrd.g4
        java -jar rrd-antlr4-0.1.2.jar --png --pdf /tmp/VeLa-rrd.g4
        find output -name "*.pdf" -exec cp {} "$GITHUB_WORKSPACE/VeLa-railroad.pdf" \;
    - uses: pyTooling/Actions/releaser@r0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: snapshot
        rm: true
        files: |
            vstar-bash.zip
            vstar-win.zip
            plugin/vstar-plugins.zip
            VeLa.g4.pdf
            VeLa-railroad.pdf
